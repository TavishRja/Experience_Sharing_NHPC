<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Upload Solution</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo-box">
            <img src="public/image.png" class="logo-img">
            <span>NHPC Portal</span>
        </div>

        <nav>
            <a href="home.html">Home</a>
            <a href="dashboard.html">Dashboard</a>

            <a href="#" onclick="logoutUser()">Logout</a>

        </nav>
    </header>

    <section class="container">

        <h2 class="page-title">Submit New Solution</h2>
        <p class="page-subtitle">Fill the form below and upload your solution in PDF format.</p>

        <form class="upload-form" onsubmit="confirmSubmit(event)" enctype="multipart/form-data">

            <div class="form-group">
                <label>Problem Title</label>
                <input type="text" placeholder="Enter title">
            </div>

            <div class="form-group">
                <label>Area</label>
                <select>
                    <option value="">Select Area</option>
                    <option>Dam</option>
                    <option>Project Station</option>
                    <option>CO Office</option>
                </select>
            </div>

            <div class="form-group">
                <label>Brief Description</label>
                <textarea rows="4" placeholder="Explain your solution briefly"></textarea>
            </div>
            <div class="form-group">
                <label>Upload Image</label>
                <input type="file" id="imageInput" accept="image/*" onchange="previewImage()">
                <img id="previewImg" style="width:100%; margin-top:10px; display:none; border-radius:8px;">
            </div>

            <div class="form-group">
                <label>Upload PDF</label>
                <input type="file" id="pdfInput" accept=".pdf">
            </div>




            <div class="btn-group">
                <button type="button" class="btn" onclick="saveDraft()">Save</button>
                <!-- <button type="button" class="btn" id="saveDraftBtn">Save</button> -->
                <button type="submit" class="btn">Confirm</button>

                <button type="button" class="btn" onclick="clearDraft()">Clear</button>

            </div>
        </form>
    </section>

    <script src="js/upload.js"></script>
</body>

</html>
