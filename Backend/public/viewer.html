<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <title>View Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/viewer.css">
</head>

<body>

    <header class="navbar">
        <div class="logo-box">
            <img src="public/image.png" class="logo-img">
            <span>NHPC Portal</span>
        </div>
        <nav>
            <a href="home.html">Home</a>
        </nav>
    </header>


    <section class="viewer-container">

        <!-- LEFT: PDF ONLY -->
        <div class="viewer-left">
            <iframe id="pdfFrame"></iframe>
        </div>

        <!-- RIGHT: ACTIONS + INFO -->
        <div class="viewer-right">

            <h2 id="vTitle"></h2>

            <p class="meta"><b>Area:</b> <span id="vArea"></span></p>
            <p class="meta"><b>Author:</b> <span id="vAuthor"></span></p>
            <p class="meta"><b>Date:</b> <span id="vDate"></span></p>
            <p class="meta"><b>Views:</b> <span id="vViews"></span></p>
            <p class="meta">
                👍 <span id="likeCount">0</span>
                &nbsp; | &nbsp;
                👎 <span id="dislikeCount">0</span>
            </p>


            <hr>

            <p id="vDesc"></p>

            <!-- ✅ ACTIONS ONLY HERE -->
            <div class="viewer-actions">
                <a id="pdfDownload" download>⬇ Download</a>
                <!-- <button onclick="react(solutionId, 'like')">👍</button>
                <button onclick="react(solutionId, 'dislike')">👎</button> -->
                <button id="likeBtn">👍 Like (<span id="likeCount">0</span>)</button>

                <button id="dislikeBtn">👎 Dislike (<span id="dislikeCount">0</span>)</button>
            </div>

        </div>
    </section>


    <script src="js/viewer.js"></script>
</body>

</html>
