<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Problems & Solutions</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>

    <header class="navbar">
        <div class="logo-box">
            <img src="public/image.png" alt="Company Logo" class="logo-img">
            <span>NHPC Portal</span>

        </div>
        <nav>
            
            <a href="login.html" id="loginBtn">Login</a>

            <a href="dashboard.html" id="dashboardLink" style="display:none;">
                My Dashboard
            </a>

            <a href="moderator.html" id="modLink" style="display:none;">
                Moderator Panel
            </a>

            <a href="#" id="logoutBtn" style="display:none" onclick="logoutUser()";>
                Logout
            </a>
        </nav>
    </header>


    <section class="container">

        <div class="home-top">

            <!-- 🔍 SEARCH BAR -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search documents..." oninput="handleSearch()">
                <img src="public/icons/search.png" class="search-icon" />
            </div>

            <!-- 🔲 GRID / LIST TOGGLE -->
            <div class="view-toggle">
                <button onclick="setView('grid')" title="Grid view">
                    <img src="public/icons/grid.png" />
                </button>
                <button onclick="setView('list')" title="List view">
                    <img src="public/icons/list.png" />
                </button>
            </div>

        </div>

        <!-- 📦 CONTENT -->
        <div id="solutionContainer" class="grid-view"></div>

    </section>



    <!-- ✅ VIEW MODAL -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>

            <img id="mImage" class="modal-img" style="display:none;">


            <h3 id="mTitle"></h3>
            <p><b>Area:</b> <span id="mArea"></span></p>
            <p><b>Description:</b> <span id="mDesc"></span></p>
            <p><b>Status:</b> <span id="mStatus"></span></p>
            <p><b>Date:</b> <span id="mDate"></span></p>
            <div id="pdfBox" style="display:none; margin:10px 0;">
                <p><b>PDF Attached</b></p>
                <a id="pdfLink" target="_blank" class="btn">Open PDF</a>
            </div>
        </div>
    </div>



    <script src="js/home.js"></script>

</body>

</html>
