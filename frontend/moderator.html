<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Moderator Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="logo-box">
            <img src="public/image.png" class="logo-img">
            <span>NHPC Portal</span>
        </div>

        <nav>
            <a href="home.html">Home</a>
            <a href="#" onclick="logoutUser()">Logout</a>
            <a href="home.html">All Solutions</a>
        </nav>
    </header>

    <section class="container">

        <!-- MODERATOR STATUS TABS -->
        <div class="mod-tabs">
            <button class="mod-tab active" data-status="Pending">Pending</button>
            <button class="mod-tab" data-status="Approved">Approved</button>
            <button class="mod-tab" data-status="Rejected">Rejected</button>
        </div>


        <!-- FILTERS -->
        <div class="filters">
            <select id="areaFilter">
                <option value="">All Areas</option>
                <option value="Dam">Dam</option>
                <option value="CO Office">CO Office</option>
                <option value="Project Station">Project Station</option>
            </select>

            <div class="date-range">
                <input type="date" id="fromDate">
                <span>to</span>
                <input type="date" id="toDate">
            </div>
        </div>



        <h2>Pending Submissions</h2>

        <table class="data-table">
            <thead>

                <tr>
                    <th>Title</th>
                    <th>Area</th>
                    <th>Employee</th>
                    <th>Status</th>
                    <th>Date</th>
                    <th>Action</th>
                    <th>Reject Reason</th>
                </tr>

            </thead>

            <!-- ✅ JS yahin rows add karega -->
            <tbody id="modTableBody"></tbody>


        </table>

    </section>
    <script src="js/moderator.js"></script>

</body>

</html>
